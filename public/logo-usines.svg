<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" width="1000" height="220">
  <!-- Fond noir -->
  <rect width="1000" height="220" fill="black"/>

  <!-- ===== USINE GAUCHE ===== -->
  <g fill="white" transform="translate(30, 20)">
    <!-- Cheminées -->
    <rect x="10" y="0" width="18" height="40" rx="3"/>
    <rect x="38" y="15" width="15" height="25" rx="2"/>
    <!-- Fumée cheminée gauche -->
    <ellipse cx="19" cy="-6" rx="8" ry="6" opacity="0.85"/>
    <ellipse cx="25" cy="-12" rx="6" ry="5" opacity="0.6"/>
    <!-- Fumée cheminée droite -->
    <ellipse cx="45" cy="9" rx="6" ry="5" opacity="0.75"/>
    <!-- Corps principal -->
    <rect x="0" y="40" width="130" height="80" rx="3"/>
    <!-- Toit en gradins -->
    <rect x="0" y="30" width="80" height="15" rx="2"/>
    <rect x="80" y="50" width="50" height="10" rx="2"/>
    <!-- Fenêtres -->
    <rect x="10" y="60" width="20" height="20" rx="2" fill="black"/>
    <rect x="40" y="60" width="20" height="20" rx="2" fill="black"/>
    <rect x="70" y="60" width="20" height="20" rx="2" fill="black"/>
    <rect x="100" y="65" width="18" height="18" rx="2" fill="black"/>
    <!-- Porte -->
    <rect x="50" y="90" width="25" height="30" rx="2" fill="black"/>
  </g>

  <!-- ===== USINE DROITE ===== -->
  <g fill="white" transform="translate(840, 20)">
    <!-- Cheminées -->
    <rect x="72" y="0" width="18" height="40" rx="3"/>
    <rect x="47" y="15" width="15" height="25" rx="2"/>
    <!-- Fumée cheminée droite -->
    <ellipse cx="81" cy="-6" rx="8" ry="6" opacity="0.85"/>
    <ellipse cx="75" cy="-12" rx="6" ry="5" opacity="0.6"/>
    <!-- Fumée cheminée gauche -->
    <ellipse cx="55" cy="9" rx="6" ry="5" opacity="0.75"/>
    <!-- Corps principal -->
    <rect x="0" y="40" width="130" height="80" rx="3"/>
    <!-- Toit en gradins -->
    <rect x="50" y="30" width="80" height="15" rx="2"/>
    <rect x="0" y="50" width="50" height="10" rx="2"/>
    <!-- Fenêtres -->
    <rect x="100" y="60" width="20" height="20" rx="2" fill="black"/>
    <rect x="70" y="60" width="20" height="20" rx="2" fill="black"/>
    <rect x="40" y="60" width="20" height="20" rx="2" fill="black"/>
    <rect x="10" y="65" width="18" height="18" rx="2" fill="black"/>
    <!-- Porte -->
    <rect x="55" y="90" width="25" height="30" rx="2" fill="black"/>
  </g>

  <!-- ===== FLÈCHES DOUBLE SENS ===== -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="white"/>
    </marker>
  </defs>

  <!-- Flèche du haut → droite -->
  <line x1="200" y1="72" x2="820" y2="72"
        stroke="white" stroke-width="3"
        marker-end="url(#arrowRight)"/>

  <!-- Flèche du bas ← gauche -->
  <line x1="820" y1="105" x2="200" y2="105"
        stroke="white" stroke-width="3"
        marker-end="url(#arrowLeft)"/>

  <!-- ===== TEXTE CENTRAL ===== -->
  <!-- Nom du site entre les deux flèches -->
  <text x="510" y="95"
        font-family="Arial Black, Arial, sans-serif"
        font-size="28"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="1">Magasins-Tereos</text>

  <!-- Sous-titre sous la flèche du bas -->
  <text x="510" y="148"
        font-family="Arial, sans-serif"
        font-size="17"
        font-weight="400"
        fill="white"
        text-anchor="middle"
        opacity="0.85"
        letter-spacing="0.5">Mise en commun des pièces détachées inutilisées</text>
</svg>
